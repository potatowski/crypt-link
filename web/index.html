<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Send encrypted, self-destructing messages securely.">
  <title>CryptLink - Secure Ephemeral Messages</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style/index.css">
  <link rel="icon" href="assets/icon/favicon.png" type="image/png">
</head>

<body class="dark-mode">

  <header class="navbar">
    <div class="brand">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      <span class="brand-text">Crypt Link</span>
    </div>
    
    <nav class="nav-links">
      <div class="icon-links">
        <button id="toggle-theme-btn" title="Alternar tema" aria-label="Toggle theme">
          <svg id="theme-icon-sun" class="hidden" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>
          <svg id="theme-icon-moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <a id="github-btn" href="https://github.com/potatowski/crypt-link" target="_blank" rel="noopener noreferrer" title="Ver no GitHub" aria-label="GitHub Repository">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
        </a>
      </div>
    </nav>
  </header>

  <main class="container">
    <div class="editor-wrapper">
      <textarea id="message" class="code-textarea" placeholder="Digite sua mensagem secreta aqui..." spellcheck="false" aria-label="Message payload"></textarea>
      
      <div id="controls-row" class="controls-row">
        <button id="encrypt-btn" class="btn btn-primary" aria-label="Create secret link">Criar Link</button>
      </div>

      <div id="result" class="result-wrapper hidden">
        <div class="result-header">
          <strong>Compartilhe este link:</strong>
        </div>
        <div class="link-section">
          <input type="text" id="link-input" class="link-input-glow" readonly onclick="this.select()" aria-label="Generated Link" />
          <button id="copy-link-btn" class="btn btn-secondary">Copiar</button>
        </div>
      </div>
    </div>
  </main>

  <!-- Notification Toast -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Modal -->
  <div id="modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modal-message">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <button class="close-btn" id="modal-close" aria-label="Close modal">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>

      <div class="modal-body">
        <div id="modal-alert" class="modal-alert hidden">
          <span>Mensagem destruída e não poderá ser lida novamente.</span>
        </div>
        
        <p id="modal-message" class="hidden"></p>
        
        <div id="decrypted-wrapper" class="hidden">
          <textarea id="decrypted-message" readonly rows="12" class="code-textarea modal-textarea"></textarea>
          <button id="decrypted-copy-btn" class="btn btn-primary mt-1 w-full">Copiar para a área de transferência</button>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <p>Created with <span class="heart">♥</span> by Potatowski</p>
  </footer>

  <script src="scripts/index.js"></script>
</body>
</html>
