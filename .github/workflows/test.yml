name: Run tests
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        cache-dependency-path: api/go.sum

    - name: Install dependencies
      run: cd api && go mod download

    - name: Create env file
      run: cd api && cp config/.env.example config/.env

    - name: Run tests
      run: cd api && go test -v ./...

    - name: Build
      run: cd api && go build -o server cmd/server/main.go
